<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小川大王</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="client-home">
    <a class="admin-link" href="/admin.html">管理员</a>

    <main class="client-stage page-enter">
      <h1 class="hero-title">小川大王</h1>

      <section class="client-search" aria-label="关键词搜索">
        <form id="searchForm" class="client-search-form">
          <input id="query" name="q" type="search" placeholder="输入关键词" autocomplete="off" />
          <button type="submit">搜索</button>
        </form>
        <p id="status" class="client-status">输入关键词后开始搜索。</p>
      </section>

      <section id="results" class="client-results" aria-live="polite"></section>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
